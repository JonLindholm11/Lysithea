<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:11434; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self';" />
  <title>Lysithea — Lunar Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- ── Base + chrome ── -->
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/titlebar-sidebar.css" />
  <link rel="stylesheet" href="./styles/projects.css" />
  <link rel="stylesheet" href="./styles/rightpanel.css" />
  <link rel="stylesheet" href="./styles/settings.css" />

  <!-- ── Workspace views (split) ── -->
  <link rel="stylesheet" href="./styles/workspace/shell.css" />
  <link rel="stylesheet" href="./styles/workspace/config.css" />
  <link rel="stylesheet" href="./styles/workspace/logs.css" />
  <link rel="stylesheet" href="./styles/workspace/patterns.css" />
  <link rel="stylesheet" href="./styles/workspace/fix.css" />
</head>
<body>
  <div id="app">
    <div class="titlebar">
      <div class="titlebar-drag"></div>
      <div class="titlebar-brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">LYSITHEA</span>
        <span class="brand-sub">by Lunar Systems</span>
      </div>
      <div class="titlebar-drag"></div>
    </div>
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-bottom">
          <button class="sidebar-icon-btn" id="btn-settings" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span class="tooltip">Settings</span>
          </button>
          <button class="sidebar-icon-btn" id="btn-ollama-status" title="Ollama Status">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
            </svg>
            <span class="ollama-dot" id="ollama-dot"></span>
          </button>
        </div>
      </aside>
      <main class="content" id="content"></main>
      <aside class="right-panel" id="right-panel"></aside>
    </div>
  </div>

  <!-- JS — load order: state → utils → views → render → init -->
  <script src="./js/state.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/projects.js"></script>
  <script src="./js/generation.js"></script>
  <script src="./js/settings.js"></script>
  <script src="./js/rightpanel.js"></script>

  <!-- Workspace views (split) -->
  <script src="./js/workspace/shell.js"></script>
  <script src="./js/workspace/config.js"></script>
  <script src="./js/workspace/logs.js"></script>
  <script src="./js/workspace/patterns.js"></script>
  <script src="./js/workspace/fix.js"></script>

  <!-- Render + init (must come after all views) -->
  <script src="./js/render.js"></script>
  <script src="./app.js"></script>
</body>
</html>
